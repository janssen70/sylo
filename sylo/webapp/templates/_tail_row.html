<div class="tail-row {{ 'malformed' if row.malformed else '' }}">
  <span class="ts"><time datetime="{{ row.receipt_time }}">{{ row.receipt_time }}</time></span>
  <span class="host">{{ row.host or row.source_ip }}</span>
  <span class="tag">{{ row.tag or '' }}</span>
  <span class="msg">{{ row.message }}</span>
</div>
